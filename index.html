<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Rana ❤️ Samah | Wedding Invitation</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400;500;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>

<!-- ================= LOADER ================= -->

<div id="loader">

    <div class="envelope">

        <div class="seal">
            R ❤️ S
        </div>

        <p class="bismillah">﷽</p>

        <h1>Wedding Invitation</h1>

        <p class="subtitle">
            Together with our families,
            we joyfully invite you to celebrate our Nikah.
        </p>

        <button id="openInvitation">
            Open Invitation
        </button>

    </div>

</div>

<!-- Decorative Background -->

<div class="background"></div>

<!-- ================= HERO ================= -->

<section class="hero">

    <div class="hero-card">

        <p class="arabic">
            بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْم
        </p>

        <h3>With the Blessings of Allah</h3>

        <h1 class="couple-name">

            Rana Fathima

            <span>&</span>

            Muhammed Samah

        </h1>

        <p class="verse">

            "And We created you in pairs."

            <br>

            <strong>Qur'an 78:8</strong>

        </p>

        <div class="date-box">

            <h2>16</h2>

            <p>August 2026</p>

            <span>Sunday • 10:30 AM</span>

        </div>

    </div>

</section>

<script src="script.js"></script>

</body>

</html>
